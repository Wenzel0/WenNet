<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HuntedThreshold</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body, html{
    height:100%;
    width:100%;
    overflow:hidden;
    position:relative;
    background:black;
}

body{
    color:white;
    opacity:0;
    animation:fadeBody 1s ease forwards;
}

@keyframes fadeBody{to{opacity:1;}}

.video-bg{
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    opacity:0;
    animation:fadeVideo 1.5s forwards;
}

@keyframes fadeVideo{
    from{opacity:0;}
    to{opacity:1;}
}

.overlay{
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

.container{
    position:absolute;
    top:50%;
    left:10%;
    transform:translateY(-50%);
    text-align:left;
    z-index:1;
}

.title{font-size:3rem;font-weight:700;margin-bottom:20px;}
.subtitle{opacity:0.7;margin-bottom:20px;}

.btn{
    padding:15px 35px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
    transition:0.3s;
    font-weight:700;
    font-size:1.2rem;
    margin-right:10px;
}

.btn:hover{transform:translateY(-3px) scale(1.05);}

.fly-text{
    position:fixed;
    z-index:9999;
    font-weight:700;
    transition:0.7s ease;
}
.fly-text.move{
    top:20px !important;
    left:20px !important;
    font-size:2rem;
}
</style>
</head>
<body>

<video class="video-bg" autoplay muted loop>
    <source src="Assets/Videos/Hunted.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>
<div class="overlay"></div>

<div class="container">
    <div class="title">Hunted</div>
    <div class="title">Threshold</div>
    <div class="subtitle">Game</div>

    <div class="buttons">
        <div class="btn" onclick="playGame(this)">▶ Play Game</div>
        <div class="btn" onclick="goBack()">⬅ Back</div>
    </div>
</div>

<script>
function playGame(el){
    const rect = el.getBoundingClientRect();

    // Floating text
    const fly = document.createElement("div");
    fly.className="fly-text";
    fly.innerText="Running Game";

    fly.style.top = rect.top+"px";
    fly.style.left = rect.left+"px";

    document.body.appendChild(fly);

    setTimeout(()=>fly.classList.add("move"),50);

    // Navigate to actual game
    setTimeout(()=>{
        window.location.href = "Assets/Games/HuntedThreshold/Index2.html";
    },700);
}

function goBack(){
    window.location.href = "games.html";
}
</script>

</body>
</html>
