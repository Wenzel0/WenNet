<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="icon.ico">
<title>ItzWenzelnet | HuntedThreshold</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body, html{
    height:100%;
    width:100%;
    overflow:hidden;
    position:relative;
    background:black;
}

body{
    color:white;
    opacity:0;
    animation:fadeBody 1s ease forwards;
}

@keyframes fadeBody{to{opacity:1;}}

.video-bg{
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    opacity:0;
    animation:fadeVideo 1.5s forwards;
}

@keyframes fadeVideo{
    from{opacity:0;}
    to{opacity:1;}
}

.overlay{
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

.container{
    position:absolute;
    top:50%;
    left:10%;
    transform:translateY(-50%);
    text-align:left;
    z-index:1;
}

.title{font-size:3rem;font-weight:700;margin-bottom:20px;}
.subtitle{opacity:0.7;margin-bottom:20px;}

.btn{
    padding:15px 35px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
    transition:0.3s;
    font-weight:700;
    font-size:1.2rem;
    margin-right:10px;
}

.btn:hover{transform:translateY(-3px) scale(1.05);}

.fly-text{
    position:fixed;
    z-index:9999;
    font-weight:700;
    transition:0.7s ease;
}
.fly-text.move{
    top:20px !important;
    left:20px !important;
    font-size:2rem;
}
</style>
</head>
<body>
<!-- POPUP -->
<div id="popup" style="
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
">
    <div style="
        background:#111;
        padding:30px;
        border-radius:15px;
        text-align:center;
        max-width:400px;
        width:90%;
        box-shadow:0 0 20px rgba(0,0,0,0.5);
    ">
        <h2 style="margin-bottom:15px;">Sorry!</h2>
        <p style="opacity:0.8; margin-bottom:25px;">
            This game is too large to run online. Please download the game instead.
        </p>

        <button onclick="closePopup()" style="
            padding:10px 20px;
            margin-right:10px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        ">Cancel</button>

        <button onclick="goDownload()" style="
            padding:10px 20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            background:#4CAF50;
            color:white;
        ">Go to Downloads</button>
    </div>
</div>
<video class="video-bg" autoplay muted loop>
    <source src="Assets/Videos/Hunted.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>
<div class="overlay"></div>

<div class="container">
    <div class="title">Hunted</div>
    <div class="title">Threshold</div>
    <div class="subtitle">Game</div>

    <div class="buttons">
        <div class="btn" onclick="playGame(this)">▶ Play Game</div>
        <div class="btn" onclick="goBack()">⬅ Back</div>
    </div>
</div>

<script>
function playGame(){
    document.getElementById("popup").style.display = "flex";
}

function goBack(){
    window.location.href = "games.html";
}
function closePopup(){
    document.getElementById("popup").style.display = "none";
}

function goDownload(){
    window.location.href = "DownloadHub.html";
}
</script>

</body>
</html>
