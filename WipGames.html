<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ItzWenzelnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
}

.container {
    text-align: center;
    width: 90%;
    max-width: 1000px;
}

.title {
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: 2px;
}

.subtitle {
    font-size: 1rem;
    opacity: 0.7;
    margin-bottom: 40px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

/* TILE STYLE */
.tile {
    position: relative;
    height: 180px;
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.35s ease;
}

/* BACKGROUND IMAGE */
.tile::before {
    content: "";
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 0.5s ease;
}

/* DARK OVERLAY */
.tile::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
}

/* TEXT LABEL */
.tile span {
    position: absolute;
    bottom: 15px;
    left: 18px;
    font-size: 1.4rem;
    font-weight: 700;
    z-index: 2;
}

/* HOVER EFFECT */
.tile:hover {
    transform: translateY(-10px) scale(1.03);
}

.tile:hover::before {
    transform: scale(1.1);
}

/* INDIVIDUAL IMAGES */
.games::before {
    background-image: url('Assets/Images/games.jpg');
}

.websites::before {
    background-image: url('Assets/Images/websites.jpg');
}

.wip::before {
    background-image: url('Assets/Images/wip.jpg');
}

.links::before {
    background-image: url('Assets/Images/links.jpg');
}

.footer {
    margin-top: 40px;
    font-size: 0.8rem;
    opacity: 0.5;
}

@media (max-width: 500px) {
    .title {
        font-size: 2.2rem;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="title">ItzWenzelnet</div>
    <div class="subtitle">projects</div>

    <div class="buttons">
        <div class="tile games" onclick="navigate('games')">
            <span>🎮 Games</span>
        </div>

        <div class="tile websites" onclick="navigate('websites')">
            <span>🌐 Websites</span>
        </div>

        <div class="tile wip" onclick="navigate('scraps')">
            <span>🧪 WIP Games</span>
        </div>

        <div class="tile links" onclick="navigate('links')">
            <span>🔗 Links</span>
        </div>
    </div>

    <div class="footer">Made by ItzWenzel - 2026</div>
</div>

<script>
function navigate(section) {
    alert('Opening ' + section + ' section...');
}
</script>

</body>
</html>
