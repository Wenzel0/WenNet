<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" type="text/css" href="Assets/Lock.css">
<title>Games</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f0f0f,#1a1a2e); /* same as index */
    color:white;
}

/* TOP TITLE */
.page-title{
    position:fixed;
    top:20px;
    left:20px;
    font-size:2rem;
    font-weight:700;
    z-index:2;
}

/* FADE OUT ON BACK */
.container{
    opacity:1;
    transition: opacity 0.5s ease;
}
.container.fade-out{
    opacity:0;
}

/* MAIN CONTENT */
.content{
    padding:100px 20px 40px;
    max-width:1000px;
    margin:auto;
}

/* GAME CARDS GRID */
.games-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

/* INDIVIDUAL GAME CARDS */
.game-card{
    position:relative;
    height:150px;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    transition:all 0.3s ease;
    color:white;
    display:flex;
    align-items:flex-end;
    padding:10px;
    font-weight:700;
    font-size:1.1rem;
}

/* BACKGROUND IMAGES */
.game-card::before{
    content:"";
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    transition:transform 0.5s ease;
    z-index:0;
}

.game-card:hover::before{
    transform:scale(1.05);
}

/* TEXT OVERLAY */
.game-card span{
    position:relative;
    z-index:1;
}

/* BACK BUTTON */
.back{
    margin-top:30px;
    display:inline-block;
    opacity:0.6;
    cursor:pointer;
    transition:0.3s;
}

.back:hover{
    opacity:1;
}

.page-title.fade-out {
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.5s ease;
}
</style>
</head>

<body>

<div class="page-title" id="pageTitle">🎮 Games</div>

<div class="container content">

    <h2>Games</h2>

    <div class="games-grid">
        <div class="game-card" style="--img:url('Assets/Images/Games/HuntedThreshold.png');" onclick="openGame('HuntedThreshold')"><span>Hunted Threshold</span></div>
        <div class="game-card" style="--img:url('Assets/Images/Games/ComingSoon.png');" onclick="openGame('ComingSoon')"><span>Coming Soon...</span></div>
    </div>

    <div class="back" onclick="goBack()">← Back to Menu</div>

</div>

<script>
// apply background images dynamically using CSS variable
document.querySelectorAll('.game-card').forEach(card=>{
    const img = card.style.getPropertyValue('--img');
    card.style.setProperty('--img','');
    card.style.setProperty('background-image', img);
    card.style.backgroundSize = 'cover';
    card.style.backgroundPosition = 'center';
});

// keep same title from index if available
const saved = localStorage.getItem("pageTitle");
if(saved){
    document.getElementById("pageTitle").innerText = saved;
}

// game click handler
function openGame(gameName){
    switch(gameName){
        case 'HuntedThreshold':
            window.location.href = 'HuntedThreshold.html';
            break;
        case 'Electron':
            window.location.href = 'Electron.html'; // or wherever Electron is hosted
            break;
        case 'ComingSoon':
            alert('Coming Soon...');
            break;
        default:
            alert('Game not found');
    }
}

// back button fade out
function goBack(){
    document.querySelector('.container').classList.add('fade-out');
    document.getElementById('pageTitle').classList.add('fade-out');

    setTimeout(()=>window.location.href='index.html',500);
}
</script>

</body>
</html>
