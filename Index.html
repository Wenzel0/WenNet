<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" type="text/css" href="Assets/Lock.css">
<title>ItzWenzelnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
    color:white;
    opacity:0;
    animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{to{opacity:1;}}

.container{
    text-align:center;
    width:90%;
    max-width:900px;
    transition:0.5s;
}

.container.fade-away{
    opacity:0;
    filter:blur(5px);
}

.title{font-size:3rem;font-weight:700;}
.subtitle{opacity:0.7;margin-bottom:40px;}

.buttons{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.btn{
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
    transition:0.3s;
    font-weight:700;
}

.btn:hover{transform:translateY(-8px) scale(1.05);}

/* shake effect */
@keyframes shake {
    0% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
    100% { transform: translateX(0); }
}

.btn.access-denied{
    color:red;
    animation: shake 0.5s;
}

/* flying text */
.fly-text{
    position:fixed;
    z-index:9999;
    font-weight:700;
    transition:0.7s ease;
}

.fly-text.move{
    top:20px !important;
    left:20px !important;
    font-size:2rem;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">ItzWenzelnet</div>
    <div class="subtitle">projects</div>

    <div class="buttons">
        <div class="btn" onclick="navigate('games', this)">🎮 Games</div>
        <div class="btn" onclick="accessDenied(this)">🌐 Websites</div>
        <div class="btn" onclick="navigate('scraps', this)">🧪 WIP Games</div>
        <div class="btn" onclick="accessDenied(this)">🔗 Links</div>
    </div>
</div>

<audio id="deniedSound" src="Assets/Sounds/AccessDenied.ogg"></audio>

<script>
function navigate(page, el){
    const rect = el.getBoundingClientRect();
    document.querySelector(".container").classList.add("fade-away");

    const fly = document.createElement("div");
    fly.className="fly-text";
    fly.innerText = el.innerText;

    fly.style.top = rect.top+"px";
    fly.style.left = rect.left+"px";

    document.body.appendChild(fly);

    setTimeout(()=>fly.classList.add("move"),50);

    setTimeout(()=>{
        localStorage.setItem("pageTitle", el.innerText);
        window.location.href = page+".html";
    },700);
}

function accessDenied(el){
    // Add red color and shake
    el.classList.add("access-denied");

    // Play sound
    const sound = document.getElementById("deniedSound");
    sound.currentTime = 0;
    sound.play();

    // Remove shake after animation completes so it can trigger again
    setTimeout(()=>el.classList.remove("access-denied"), 500);
}
</script>

</body>
</html>
